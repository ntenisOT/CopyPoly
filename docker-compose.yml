# ============================================
# CopyPoly — Docker Compose
# 
# Destroy everything:  docker compose down -v
# Recreate everything: docker compose up --build
# ============================================

services:
  # ------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------
  db:
    image: postgres:18-alpine
    container_name: copypoly-db
    environment:
      POSTGRES_USER: copypoly
      POSTGRES_PASSWORD: copypoly
      POSTGRES_DB: copypoly
    volumes:
      - ./data/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copypoly -d copypoly"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=8GB
      -c effective_cache_size=22GB
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
      -c max_connections=1000
    deploy:
      resources:
        limits:
          memory: 30G

  # ------------------------------------------
  # PgBouncer — Connection Pooler
  # App connects here, PgBouncer multiplexes
  # into a small set of real PG connections.
  # ------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: copypoly-pgbouncer
    environment:
      DATABASE_URL: postgres://copypoly:copypoly@db:5432/copypoly
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 1000
      MAX_CLIENT_CONN: 2000
      MIN_POOL_SIZE: 50
      AUTH_TYPE: plain
    ports:
      - "5433:5432"  # 5433 host for local access via pgbouncer
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U copypoly"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ------------------------------------------
  # Alembic Migrations (run-once, then exit)
  # Migrations go direct to PG (not pgbouncer)
  # because DDL needs session-mode connections.
  # ------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copypoly-migrations
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://copypoly:copypoly@db:5432/copypoly
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ------------------------------------------
  # CopyPoly Application
  # Connects via PgBouncer for connection pooling
  # ------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copypoly-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://copypoly:copypoly@pgbouncer:5432/copypoly
      DISABLE_SCHEDULER: "true"  # Backfill mode — no background jobs
    ports:
      - "8000:8000"  # FastAPI dashboard API
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 5G
    volumes:
      # Mount source for hot-reload during development
      - ./src:/app/src:ro
